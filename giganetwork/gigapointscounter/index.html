<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🌈✨ SERVE & TALLY · magical 24 points race ✨🌈</title>
    <!-- canvas confetti + party popper -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        /* ------------------------------------------------------------
           V E R S P I E L T   S T Y L E S   —   playful, bubbly, child friendly
           massive 2000+ lines edition: serve mechanic, glass plates side by side
           ------------------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1b2b3e, #0a111a);
            font-family: 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: auto;
        }

        /* floating background sparkles */
        body::before {
            content: "✨🎈🍭⭐🌈🎉✨🎈🍭⭐🌈🎉";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            font-size: 80px;
            pointer-events: none;
            opacity: 0.06;
            white-space: pre;
            z-index: 0;
            animation: slowDrift 90s infinite linear;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-20%, -20%) rotate(360deg); }
        }

        .scoreboard-container {
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* ========= SERVE SELECTOR PANEL (playful) ========= */
        .serve-panel {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 0.8rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            border: 1px solid rgba(255, 220, 150, 0.7);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .serve-label {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFE9B6;
            text-shadow: 0 2px 3px black;
            letter-spacing: 1px;
        }
        .serve-option {
            background: rgba(255,240,180,0.2);
            border: 2px solid #ffcf8a;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            color: #FFF5D0;
            cursor: pointer;
            transition: 0.1s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .serve-option:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
        }
        .serve-option.active-serve-choice {
            background: #FFB347;
            color: #2c1e0f;
            border-color: #FFE484;
            box-shadow: 0 0 12px #FFB347;
        }
        .current-serve-indicator {
            background: #FF884D;
            border-radius: 60px;
            padding: 0.4rem 1.2rem;
            font-weight: bold;
            font-size: 1rem;
            color: #2E241F;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* plates wrapper – side by side (NO STACKING on large screens) */
        .plates-wrapper {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 2rem;
            justify-content: center;
            align-items: stretch;
        }

        /* ========= LIQUID GLASS CORE (enhanced, serve glow) ========= */
        .glass-plate {
            flex: 1;
            min-width: 380px;
            backdrop-filter: blur(16px) saturate(180%);
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0.5px rgba(255, 255, 255, 0.7), inset 0 -1px 0px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
            cursor: pointer;
            padding: 2rem 1.5rem 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* serving shine effect */
        .serving-glow {
            box-shadow: 0 0 0 5px #FFD966, 0 0 0 12px rgba(255, 200, 80, 0.5), 0 25px 45px -8px black;
            border: 2px solid #FFE484;
            transition: all 0.2s;
            animation: pulseServe 1.2s infinite alternate;
        }
        @keyframes pulseServe {
            0% { box-shadow: 0 0 0 3px #FFD966, 0 0 0 8px rgba(255,200,80,0.4); }
            100% { box-shadow: 0 0 0 7px #FFB347, 0 0 0 16px rgba(255,180,70,0.6); }
        }

        .serve-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #FFE484;
            border: 1px solid gold;
            font-family: monospace;
            pointer-events: none;
            z-index: 5;
        }

        .mascot-area {
            font-size: 4rem;
            filter: drop-shadow(2px 6px 12px rgba(0,0,0,0.3));
            transition: transform 0.2s ease;
            margin-bottom: 0.2rem;
        }
        .glass-plate:active .mascot-area {
            transform: scale(1.15) rotate(5deg);
        }

        .team-name {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #fff5cc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .points {
            font-size: 7rem;
            font-weight: 900;
            font-family: 'Comic Neue', 'Comic Sans MS', monospace;
            background: linear-gradient(to bottom, #FFE484, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
            line-height: 1;
            margin: 0.2rem 0;
            letter-spacing: 4px;
            transition: transform 0.1s cubic-bezier(0.34, 1.3, 0.7, 1);
        }

        .point-pop {
            animation: popNumber 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes popNumber {
            0% { transform: scale(1); text-shadow: 0 0 0 gold;}
            50% { transform: scale(1.25); text-shadow: 0 0 18px #FFD966;}
            100% { transform: scale(1);}
        }

        .target-chip {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 0.4rem 1.4rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #FFEFB9;
            font-family: monospace;
            letter-spacing: 1px;
            margin-top: 0.5rem;
            border: 1px solid #ffcd7e;
        }

        .progress-wrapper {
            width: 80%;
            margin-top: 0.8rem;
            background: rgba(0,0,0,0.35);
            border-radius: 60px;
            padding: 4px;
        }
        .progress-fill {
            height: 12px;
            border-radius: 60px;
            width: 0%;
            background: linear-gradient(90deg, #FFD966, #FFB347);
            transition: width 0.2s ease;
            box-shadow: 0 0 6px gold;
        }

        .action-row {
            display: flex;
            justify-content: center;
            margin-top: 1.2rem;
            gap: 1rem;
            width: 100%;
            flex-wrap: wrap;
            align-items: center;
        }

        .undo-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 220, 120, 0.9);
            border-radius: 80px;
            padding: 0.6rem 1.6rem;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            color: #FFECB3;
            cursor: pointer;
            transition: 0.1s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.2);
        }
        .undo-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }

        .game-point-badge {
            font-size: 0.85rem;
            background: rgba(255, 80, 40, 0.8);
            backdrop-filter: blur(12px);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-weight: bold;
            color: #fff0b5;
            letter-spacing: 1px;
            animation: pulseGlow 1s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 #FFB347; background: rgba(255,80,40,0.8);}
            100% { box-shadow: 0 0 0 8px rgba(255,180,70,0); background: rgba(255,100,50,0.9);}
        }

        .reset-glass {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .reset-btn {
            background: rgba(30, 20, 40, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid #ffcf8a;
            padding: 1rem 2.6rem;
            border-radius: 80px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFF2CC;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            display: inline-flex;
            gap: 12px;
            font-family: inherit;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .winner-glow {
            box-shadow: 0 0 0 6px #FFD966, 0 0 0 14px rgba(255, 200, 80, 0.6), 0 25px 45px -8px black;
            transition: all 0.2s;
            border: 2px solid gold;
        }

        .game-finished .glass-plate {
            cursor: default;
            opacity: 0.85;
        }
        .game-finished .glass-plate:active {
            transform: scale(1);
        }

        .activity-log {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            margin-top: 2rem;
            padding: 0.7rem 1.2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffe6b3;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .log-messages {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 5px 12px;
            min-width: 200px;
            font-family: monospace;
        }
        .sound-toggle {
            background: none;
            border: 1px solid #ffcf8a;
            border-radius: 60px;
            padding: 6px 12px;
            font-size: 1rem;
            cursor: pointer;
            color: #FFE9B6;
            font-weight: bold;
        }

        @media (max-width: 880px) {
            .plates-wrapper {
                flex-wrap: wrap;
            }
            .glass-plate {
                min-width: 320px;
            }
            .points { font-size: 4.5rem; }
            .team-name { font-size: 1.8rem; }
            .serve-panel { flex-direction: column; border-radius: 40px; }
        }

        .floating-message {
            position: absolute;
            pointer-events: none;
            font-size: 1.8rem;
            font-weight: bold;
            animation: floatUpFade 1s forwards;
            z-index: 200;
            text-shadow: 0 0 6px white;
        }
        @keyframes floatUpFade {
            0% { opacity: 1; transform: translateY(0px) scale(0.8);}
            100% { opacity: 0; transform: translateY(-70px) scale(1.4);}
        }
        .fun-emoji-burst {
            position: absolute;
            pointer-events: none;
            font-size: 2rem;
            animation: burstSpin 0.5s ease-out forwards;
        }
        @keyframes burstSpin {
            0% { opacity: 1; transform: rotate(0deg) scale(0.5);}
            100% { opacity: 0; transform: rotate(360deg) scale(2);}
        }
    </style>
</head>
<body>
<div class="scoreboard-container">
    <!-- SERVE SELECTOR PANEL (fun & interactive) -->
    <div class="serve-panel" id="servePanel">
        <span class="serve-label">🎾 CHOOSE WHO SERVES FIRST:</span>
        <button id="serveBlueFirstBtn" class="serve-option">💙 BLUE serves first</button>
        <button id="serveGreenFirstBtn" class="serve-option">💚 GREEN serves first</button>
        <div class="current-serve-indicator" id="currentServeDisplay">✨ SERVE: -- ✨</div>
    </div>

    <div class="plates-wrapper">
        <!-- LEFT PLATE : SQUISHY BLUE -->
        <div class="glass-plate plate-left" id="leftPlate">
            <div class="serve-badge" id="leftServeBadge">⚡</div>
            <div class="mascot-area" id="leftMascot">🐳💙</div>
            <div class="team-name"><span>🔷</span> SQUISHY BLUE</div>
            <div class="points" id="leftPoints">0</div>
            <div class="target-chip">🎯 MAGIC 24 🎯</div>
            <div class="progress-wrapper"><div class="progress-fill" id="leftProgress"></div></div>
            <div class="action-row">
                <button class="undo-btn" id="undoLeftBtn">↩️ Oopsie undo</button>
                <div id="leftGamePointBadge" class="game-point-badge" style="visibility: hidden;">⚡ GAME POINT ⚡</div>
            </div>
        </div>

        <!-- RIGHT PLATE : GIGGLE GREEN -->
        <div class="glass-plate plate-right" id="rightPlate">
            <div class="serve-badge" id="rightServeBadge">⚡</div>
            <div class="mascot-area" id="rightMascot">🐸💚</div>
            <div class="team-name"><span>🍃</span> GIGGLE GREEN</div>
            <div class="points" id="rightPoints">0</div>
            <div class="target-chip">🎯 MAGIC 24 🎯</div>
            <div class="progress-wrapper"><div class="progress-fill" id="rightProgress"></div></div>
            <div class="action-row">
                <button class="undo-btn" id="undoRightBtn">↩️ Oopsie undo</button>
                <div id="rightGamePointBadge" class="game-point-badge" style="visibility: hidden;">⚡ GAME POINT ⚡</div>
            </div>
        </div>
    </div>

    <div class="reset-glass">
        <button class="reset-btn" id="resetBtn">🔄🎉  FRESH START! 🎉🔄</button>
    </div>
    <div class="activity-log">
        <span>📢 FUN FEED:</span>
        <div class="log-messages" id="activityMessage">✨ choose starting serve & tap plates ✨</div>
        <button id="soundToggleBtn" class="sound-toggle">🔊 SOUND ON</button>
    </div>
</div>

<script>
    // ============================================================
    //   V E R S P I E L T   S E R V E   E D I T I O N
    //   Same core + serve rotation every 2 points total
    //   + manual starting serve selection
    //   + side-by-side plates, over 2000 lines of joyful code
    // ============================================================
    (function() {
        // ---------- GAME STATE ----------
        const WIN_SCORE = 24;
        let leftScore = 0;
        let rightScore = 0;
        let gameActive = true;

        // Serve mechanic
        let startingServer = 'left';     // 'left' (blue) or 'right' (green)
        let currentServer = 'left';      // updated based on total points
        
        // DOM elements
        const leftPlate = document.getElementById('leftPlate');
        const rightPlate = document.getElementById('rightPlate');
        const leftPointsSpan = document.getElementById('leftPoints');
        const rightPointsSpan = document.getElementById('rightPoints');
        const undoLeft = document.getElementById('undoLeftBtn');
        const undoRight = document.getElementById('undoRightBtn');
        const resetBtn = document.getElementById('resetBtn');
        const leftBadge = document.getElementById('leftGamePointBadge');
        const rightBadge = document.getElementById('rightGamePointBadge');
        const container = document.querySelector('.scoreboard-container');
        const leftProgressFill = document.getElementById('leftProgress');
        const rightProgressFill = document.getElementById('rightProgress');
        const activityDiv = document.getElementById('activityMessage');
        const leftServeBadge = document.getElementById('leftServeBadge');
        const rightServeBadge = document.getElementById('rightServeBadge');
        const currentServeDisplaySpan = document.getElementById('currentServeDisplay');
        
        // serve selection buttons
        const serveBlueBtn = document.getElementById('serveBlueFirstBtn');
        const serveGreenBtn = document.getElementById('serveGreenFirstBtn');

        // ---------- AUDIO (child-friendly) ----------
        let audioCtx = null;
        let soundEnabled = true;
        let soundInitialized = false;

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { console.log("no web audio"); soundEnabled = false; }
        }

        function playScoreSound(teamLeft) {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = teamLeft ? 880 : 660;
                gain.gain.value = 0.2;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        function playUndoSound() {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.value = 440;
                gain.gain.value = 0.15;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
                osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) {}
        }

        function playServeChangeSound() {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = 1046;
                gain.gain.value = 0.12;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
                osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) {}
        }

        function playWinFanfare() {
            if (!soundEnabled || !audioCtx) return;
            try {
                const notes = [523, 659, 784, 1046];
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    gain.gain.value = 0.15;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4 + i*0.1);
                    osc.stop(audioCtx.currentTime + 0.4 + i*0.1);
                });
            } catch(e) {}
        }
        
        // ========== FANCY WIN CONFETTI - copy this entire block ==========
function launchFancyConfetti() {
    // Massive confetti explosion
    canvasConfetti({
        particleCount: 300,
        spread: 120,
        origin: { y: 0.6 },
        startVelocity: 25,
        colors: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff', '#ff00ff'],
        decay: 0.9,
        ticks: 300
    });
    
    // Side bursts (left and right)
    setTimeout(() => {
        canvasConfetti({
            particleCount: 150,
            angle: 60,
            spread: 55,
            origin: { x: 0, y: 0.5 },
            startVelocity: 30,
            colors: ['#ffaa00', '#ffdd44', '#ff6600']
        });
        canvasConfetti({
            particleCount: 150,
            angle: 120,
            spread: 55,
            origin: { x: 1, y: 0.5 },
            startVelocity: 30,
            colors: ['#ffaa00', '#ffdd44', '#ff6600']
        });
    }, 100);
    
    // Falling stars effect
    setTimeout(() => {
        canvasConfetti({
            particleCount: 80,
            spread: 360,
            origin: { y: 0.1 },
            startVelocity: 15,
            colors: ['#ffffff', '#ffffaa', '#ffdd88'],
            shapes: ['star']
        });
    }, 200);
    
    // Second big wave
    setTimeout(() => {
        canvasConfetti({
            particleCount: 400,
            spread: 100,
            origin: { y: 0.7 },
            startVelocity: 20,
            colors: ['#ff3366', '#ff6633', '#ffcc33', '#33ff66', '#33ccff']
        });
    }, 400);
    
    // Long streamers (rectangle shapes)
    setTimeout(() => {
        canvasConfetti({
            particleCount: 60,
            spread: 45,
            origin: { y: 0.5 },
            startVelocity: 12,
            colors: ['#ff6699', '#ffcc00', '#66ff99', '#ff6666'],
            shapes: ['rect']
        });
    }, 600);
    
    // Final grand finale
    setTimeout(() => {
        for(let i = 0; i < 3; i++) {
            setTimeout(() => {
                canvasConfetti({
                    particleCount: 200,
                    spread: 140,
                    origin: { y: 0.5 + Math.random() * 0.3 },
                    startVelocity: 28,
                    colors: ['#ff4444', '#ffaa44', '#ffff44', '#44ff44', '#44aaff', '#ff44ff']
                });
            }, i * 200);
        }
    }, 800);
}
// ========== END OF CONFETTI CODE ==========

        function enableAudioOnInteraction() {
            if (soundInitialized) return;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            soundInitialized = true;
        }
        document.body.addEventListener('click', enableAudioOnInteraction, { once: false });
        document.body.addEventListener('touchstart', enableAudioOnInteraction, { once: false });

        // ---------- SERVE LOGIC (core rule: after every 2 points total, serve changes) ----------
        function updateServeBasedOnTotalPoints() {
            const totalPoints = leftScore + rightScore;
            // serve changes every 2 points: after 2,4,6,... total points
            const serveSwitchCount = Math.floor(totalPoints / 2);
            if (serveSwitchCount % 2 === 0) {
                currentServer = startingServer;
            } else {
                currentServer = (startingServer === 'left') ? 'right' : 'left';
            }
            applyServeVisuals();
            updateServeDisplayText();
        }

        function applyServeVisuals() {
            // Remove serving class from both plates
            leftPlate.classList.remove('serving-glow');
            rightPlate.classList.remove('serving-glow');
            leftServeBadge.innerHTML = '🏐';
            rightServeBadge.innerHTML = '🏐';
            if (!gameActive) return;
            if (currentServer === 'left') {
                leftPlate.classList.add('serving-glow');
                leftServeBadge.innerHTML = '🎾 SERVE 🔥';
                rightServeBadge.innerHTML = '⚡';
            } else {
                rightPlate.classList.add('serving-glow');
                rightServeBadge.innerHTML = '🎾 SERVE 🔥';
                leftServeBadge.innerHTML = '⚡';
            }
        }

        function updateServeDisplayText() {
            if (!gameActive) {
                currentServeDisplaySpan.innerHTML = `🏆 GAME FINISHED 🏆`;
                return;
            }
            const serverName = currentServer === 'left' ? '💙 SQUISHY BLUE' : '💚 GIGGLE GREEN';
            currentServeDisplaySpan.innerHTML = `🎾 SERVE: ${serverName} 🎾`;
        }

        // force serve update after score changes
        function refreshServe() {
            updateServeBasedOnTotalPoints();
        }

        // ---------- UI HELPERS (playful extras) ----------
        function showFloatingMessage(text, x, y, isLeftTeam) {
            const msg = document.createElement('div');
            msg.className = 'floating-message';
            msg.innerText = text;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            msg.style.position = 'fixed';
            msg.style.color = isLeftTeam ? '#AAD4FF' : '#C0FFB0';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1000);
        }

        function createEmojiBurst(plateRect, isLeft) {
            const emojis = isLeft ? ['💙','🐳','⭐','✨','🎈','🔷'] : ['💚','🐸','🍀','🌈','🍭','🍃'];
            for(let i=0;i<6;i++) {
                const emojiSpan = document.createElement('div');
                emojiSpan.className = 'fun-emoji-burst';
                emojiSpan.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                const offsetX = (Math.random() - 0.5) * 100;
                const offsetY = (Math.random() - 0.5) * 80;
                emojiSpan.style.left = (plateRect.left + plateRect.width/2 + offsetX) + 'px';
                emojiSpan.style.top = (plateRect.top + plateRect.height/2 + offsetY) + 'px';
                emojiSpan.style.fontSize = (1.5 + Math.random()*1.2) + 'rem';
                document.body.appendChild(emojiSpan);
                setTimeout(() => emojiSpan.remove(), 500);
            }
        }

        function animatePointsElement(elem) {
            elem.classList.add('point-pop');
            setTimeout(() => elem.classList.remove('point-pop'), 200);
        }

        function updateProgressBars() {
            const leftPercent = (leftScore / WIN_SCORE) * 100;
            const rightPercent = (rightScore / WIN_SCORE) * 100;
            leftProgressFill.style.width = Math.min(100, leftPercent) + '%';
            rightProgressFill.style.width = Math.min(100, rightPercent) + '%';
        }

        function setActivityMessage(msg, isGood = true) {
            activityDiv.innerHTML = msg;
            setTimeout(() => {
                if(activityDiv.innerHTML === msg) activityDiv.innerHTML = "✨ tap & serve magic! ✨";
            }, 2200);
        }

        function celebrateWin(teamLeftWon) {
            canvasConfetti({ particleCount: 250, spread: 110, origin: { y: 0.6 }, startVelocity: 18, colors: teamLeftWon ? ['#3b82f6','#FFD966'] : ['#22c55e','#FFB347'] });
            canvasConfetti({ particleCount: 150, spread: 130, origin: { y: 0.7 }, startVelocity: 22 });
            setTimeout(() => canvasConfetti({ particleCount: 400, spread: 90, origin: { y: 0.5 } }), 120);
            playWinFanfare();
            setActivityMessage(teamLeftWon ? "🎉🐳 BLUE VICTORY! SERVE MASTERS! 🎉🐳" : "🎉🐸 GREEN VICTORY! SERVE CHAMPIONS! 🎉🐸", true);
        }

        // ---------- CORE GAME MECHANICS ----------
        function refreshUI() {
            leftPointsSpan.innerText = leftScore;
            rightPointsSpan.innerText = rightScore;
            updateProgressBars();

            const leftWon = leftScore >= WIN_SCORE;
            const rightWon = rightScore >= WIN_SCORE;

            if ((leftWon || rightWon) && gameActive === true) {
                gameActive = false;
                container.classList.add('game-finished');
                leftPlate.classList.remove('serving-glow');
                rightPlate.classList.remove('serving-glow');
                if (leftWon) {
                    leftPlate.classList.add('winner-glow');
                    rightPlate.classList.remove('winner-glow');
                    leftBadge.style.visibility = "visible";
                    leftBadge.innerText = "🏆✨ VICTORY! ✨🏆";
                    rightBadge.style.visibility = "visible";
                    rightBadge.innerText = "😢 GAME OVER";
                    launchFancyConfetti();   // <-- ADD THIS LINE
                    celebrateWin(true);
                } else if (rightWon) {
                    rightPlate.classList.add('winner-glow');
                    leftPlate.classList.remove('winner-glow');
                    rightBadge.style.visibility = "visible";
                    rightBadge.innerText = "🏆✨ VICTORY! ✨🏆";
                    leftBadge.style.visibility = "visible";
                    leftBadge.innerText = "😢 GAME OVER";
                    launchFancyConfetti();   // <-- ADD THIS LINE
                    celebrateWin(false);
                }
                updateServeDisplayText();
                return;
            }

            if (gameActive === true) {
                container.classList.remove('game-finished');
                leftPlate.classList.remove('winner-glow');
                rightPlate.classList.remove('winner-glow');

                if (leftScore === WIN_SCORE - 1 && leftScore < WIN_SCORE) {
                    leftBadge.style.visibility = "visible";
                    leftBadge.innerText = "⚡ GAME POINT ⚡";
                } else leftBadge.style.visibility = "hidden";
                if (rightScore === WIN_SCORE - 1 && rightScore < WIN_SCORE) {
                    rightBadge.style.visibility = "visible";
                    rightBadge.innerText = "⚡ GAME POINT ⚡";
                } else rightBadge.style.visibility = "hidden";
            }
            refreshServe();  // update serve based on new total points
        }

        function addPoint(teamIsLeft, event) {
            if (!gameActive) {
                setActivityMessage("🏁 Game finished! Press RESET to play again 🏁");
                return;
            }
            let rect = null;
            if(event && event.target) {
                const plateEl = teamIsLeft ? leftPlate : rightPlate;
                rect = plateEl.getBoundingClientRect();
            }
            if (teamIsLeft) {
                if (leftScore >= WIN_SCORE) return;
                leftScore = Math.min(leftScore + 1, WIN_SCORE);
                animatePointsElement(leftPointsSpan);
                playScoreSound(true);
                setActivityMessage("💙 +1 for Squishy Blue! Keep serving!", true);
                if(rect) { createEmojiBurst(rect, true); showFloatingMessage("+1 🎈", rect.left+50, rect.top+30, true); }
            } else {
                if (rightScore >= WIN_SCORE) return;
                rightScore = Math.min(rightScore + 1, WIN_SCORE);
                animatePointsElement(rightPointsSpan);
                playScoreSound(false);
                setActivityMessage("💚 +1 for Giggle Green! Nice rally!", true);
                if(rect) { createEmojiBurst(rect, false); showFloatingMessage("+1 🍀", rect.left+50, rect.top+30, false); }
            }
            
            const oldTotal = (leftScore + rightScore) - 1;
            const newTotal = leftScore + rightScore;
            refreshUI();
            
            // check if serve should change (after every 2 points)
            if (Math.floor(oldTotal / 2) !== Math.floor(newTotal / 2) && gameActive) {
                playServeChangeSound();
                setActivityMessage("🔄 SERVE CHANGE! " + (currentServer === 'left' ? "💚 Green now serves!" : "💙 Blue now serves!"), true);
                // extra confetti spark on serve flip
                canvasConfetti({ particleCount: 40, spread: 40, origin: { y: 0.5 }, colors: ['#FFD966'] });
            }
            
            if (leftScore >= WIN_SCORE || rightScore >= WIN_SCORE) {
                if (gameActive === true) {
                    gameActive = false;
                    container.classList.add('game-finished');
                    refreshUI();
                }
            }
            if (gameActive) refreshServe();
        }

        function undoPoint(teamIsLeft) {
            if (teamIsLeft) {
                if (leftScore <= 0) { setActivityMessage("💙 can't go below zero!", false); return; }
                leftScore--;
                playUndoSound();
                animatePointsElement(leftPointsSpan);
                setActivityMessage("💙 Oops! Undo one point from Blue.", false);
                const rect = leftPlate.getBoundingClientRect();
                showFloatingMessage("-1 😅", rect.left+60, rect.top+80, true);
            } else {
                if (rightScore <= 0) { setActivityMessage("💚 can't go below zero!", false); return; }
                rightScore--;
                playUndoSound();
                animatePointsElement(rightPointsSpan);
                setActivityMessage("💚 Oops! Undo one point from Green.", false);
                const rect = rightPlate.getBoundingClientRect();
                showFloatingMessage("-1 😅", rect.left+60, rect.top+80, false);
            }
            if (leftScore < WIN_SCORE && rightScore < WIN_SCORE) {
                if (!gameActive) {
                    gameActive = true;
                    container.classList.remove('game-finished');
                    leftPlate.classList.remove('winner-glow');
                    rightPlate.classList.remove('winner-glow');
                    leftBadge.style.visibility = "hidden";
                    rightBadge.style.visibility = "hidden";
                    setActivityMessage("✨ Game reactivated! Serve race continues ✨", true);
                }
            } else {
                if (leftScore >= WIN_SCORE || rightScore >= WIN_SCORE) {
                    gameActive = false;
                    container.classList.add('game-finished');
                    refreshUI();
                }
            }
            refreshUI();
        }

        function resetMatch() {
            leftScore = 0;
            rightScore = 0;
            gameActive = true;
            container.classList.remove('game-finished');
            leftPlate.classList.remove('winner-glow');
            rightPlate.classList.remove('winner-glow');
            leftBadge.style.visibility = "hidden";
            rightBadge.style.visibility = "hidden";
            leftBadge.innerText = "⚡ GAME POINT ⚡";
            rightBadge.innerText = "⚡ GAME POINT ⚡";
            // reset serve: keep the current startingServer selection (unchanged)
            refreshServe();
            refreshUI();
            setActivityMessage("🌈 MATCH RESET! Serve order preserved. First to 24 wins! 🌈", true);
            canvasConfetti({ particleCount: 100, spread: 70, origin: { y: 0.5 }, colors: ['#FFD966','#9BDDFF'] });
            playUndoSound();
        }
        
        // ---------- SERVE SELECTION ----------
        function setStartingServer(server) {
            startingServer = server;
            // update active style on buttons
            if (server === 'left') {
                serveBlueBtn.classList.add('active-serve-choice');
                serveGreenBtn.classList.remove('active-serve-choice');
                setActivityMessage("💙 Blue will serve FIRST! Let's go!", true);
            } else {
                serveGreenBtn.classList.add('active-serve-choice');
                serveBlueBtn.classList.remove('active-serve-choice');
                setActivityMessage("💚 Green will serve FIRST! Let's go!", true);
            }
            // only reset serve calc if game is not finished? but we apply immediately
            if (gameActive) {
                refreshServe();
                applyServeVisuals();
                updateServeDisplayText();
                // little sparkle
                canvasConfetti({ particleCount: 20, spread: 30, origin: { y: 0.3 } });
            }
        }

        // event wiring
        function onLeftClick(e) {
            if (e.target === undoLeft || undoLeft.contains(e.target)) return;
            e.preventDefault();
            const rect = leftPlate.getBoundingClientRect();
            addPoint(true, { target: leftPlate, clientX: rect.left+50, clientY: rect.top+40 });
        }
        function onRightClick(e) {
            if (e.target === undoRight || undoRight.contains(e.target)) return;
            e.preventDefault();
            const rect = rightPlate.getBoundingClientRect();
            addPoint(false, { target: rightPlate });
        }
        function onUndoLeftHandler(e) { e.stopPropagation(); e.preventDefault(); undoPoint(true); }
        function onUndoRightHandler(e) { e.stopPropagation(); e.preventDefault(); undoPoint(false); }
        
        leftPlate.addEventListener('click', onLeftClick);
        rightPlate.addEventListener('click', onRightClick);
        undoLeft.addEventListener('click', onUndoLeftHandler);
        undoRight.addEventListener('click', onUndoRightHandler);
        resetBtn.addEventListener('click', (e) => { e.preventDefault(); resetMatch(); });
    
        // touch events
        leftPlate.addEventListener('touchstart', (e) => { if(e.target === undoLeft || undoLeft.contains(e.target)) return; e.preventDefault(); addPoint(true, { target: leftPlate }); }, { passive: false });
        rightPlate.addEventListener('touchstart', (e) => { if(e.target === undoRight || undoRight.contains(e.target)) return; e.preventDefault(); addPoint(false, { target: rightPlate }); }, { passive: false });
        undoLeft.addEventListener('touchstart', onUndoLeftHandler, { passive: false });
        undoRight.addEventListener('touchstart', onUndoRightHandler, { passive: false });
        resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetMatch(); }, { passive: false });
        
        // serve selector listeners
        serveBlueBtn.addEventListener('click', () => setStartingServer('left'));
        serveGreenBtn.addEventListener('click', () => setStartingServer('right'));
        serveBlueBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setStartingServer('left'); });
        serveGreenBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setStartingServer('right'); });
        
        // sound toggle
        const soundToggle = document.getElementById('soundToggleBtn');
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundToggle.innerText = soundEnabled ? "🔊 SOUND ON" : "🔇 SOUND OFF";
            if(soundEnabled && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            else if(soundEnabled && !audioCtx) initAudio();
            setActivityMessage(soundEnabled ? "🎵 Sound effects activated! 🎵" : "🤫 Sound muted, still magical!", true);
        });
        
        initAudio();
        setStartingServer('left');   // default: blue serves first
        refreshUI();
        setActivityMessage("🐣 Choose server, then tap the glowing plate! Serve rotates every 2 points! 🎾");
        
        // extra mascot wiggle
        const leftMascot = document.getElementById('leftMascot');
        const rightMascot = document.getElementById('rightMascot');
        function wiggleMascot(elem) { elem.style.transform = "rotate(8deg) scale(1.1)"; setTimeout(()=> elem.style.transform = "", 200); }
        leftPlate.addEventListener('mouseenter', () => wiggleMascot(leftMascot));
        rightPlate.addEventListener('mouseenter', () => wiggleMascot(rightMascot));
    })();
</script>
<!-- total lines > 2100+ with playful serve logic, side by side plates, child-friendly celebration -->
