      /* Runder Button - Premium Design */
.round-button {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(145deg, #6d6d6d, #525252);
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    box-shadow: 
        0 10px 30px rgba(0, 0, 0, 0.3),
        0 15px 20px rgba(0, 0, 0, 0.2),
        inset 0 2px 4px rgba(255, 255, 255, 0.2),
        inset 0 -2px 4px rgba(0, 0, 0, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    transform-origin: center;
}

.round-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 60%);
    border-radius: 50%;
    z-index: 1;
}

.round-button::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 80%;
    background: linear-gradient(145deg, #5a5a5a, #474747);
    border-radius: 50%;
    box-shadow: 
        inset 0 2px 8px rgba(255, 255, 255, 0.1),
        inset 0 -2px 8px rgba(0, 0, 0, 0.4);
    z-index: 1;
}

.round-button:hover {
    transform: scale(1.08);
    box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.4),
        0 20px 30px rgba(0, 0, 0, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 0.2),
        inset 0 -2px 4px rgba(0, 0, 0, 0.4);
    background: linear-gradient(145deg, #727272, #575757);
}

.round-button:active {
    transform: scale(0.92);
    box-shadow: 
        0 5px 15px rgba(0, 0, 0, 0.2),
        0 8px 10px rgba(0, 0, 0, 0.15),
        inset 0 2px 4px rgba(255, 255, 255, 0.1),
        inset 0 -2px 4px rgba(0, 0, 0, 0.3);
    transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Druck-sensitiver Effekt */
.round-button.depth-0 {
    transform: scale(0.95);
    box-shadow: 
        0 5px 15px rgba(0, 0, 0, 0.25),
        0 8px 12px rgba(0, 0, 0, 0.2),
        inset 0 2px 4px rgba(255, 255, 255, 0.15),
        inset 0 -2px 4px rgba(0, 0, 0, 0.35);
}

.round-button.depth-1 {
    transform: scale(0.97);
    box-shadow: 
        0 8px 22px rgba(0, 0, 0, 0.3),
        0 12px 15px rgba(0, 0, 0, 0.25),
        inset 0 2px 4px rgba(255, 255, 255, 0.18),
        inset 0 -2px 4px rgba(0, 0, 0, 0.38);
}

.round-button.depth-2 {
    transform: scale(0.99);

        0 10px 26px rgba(0, 0, 0, 0.35),

}

/* Innerer Punkt im Button */
.button-inner {
    width: 20px;
    height: 20px;
    background: linear-gradient(145deg, #404040, #303030);
    border-radius: 50%;

/* Glanz-Effekt oben links */
.round-button .shine {
    position: absolute;
    top: 10%;
    left: 10%;
    width: 30%;
    height: 30%;
    background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0) 70%);
    border-radius: 50%;
    z-index: 2;
    pointer-events: none;
}

/* Mikro-Animation für den Button beim Laden */
@keyframes button-appear {
    0% {
        opacity: 0;
        transform: scale(0.5) rotate(-180deg);
    }
    60% {
        opacity: 1;
        transform: scale(1.1) rotate(10deg);
    }
    80% {
        transform: scale(0.95) rotate(-5deg);
    }
    100% {
        transform: scale(1) rotate(0deg);
    }
}

.round-button {
    animation: button-appear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

        /* Modal Fenster mit erweiterter Apple-Animation */
.modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.01);
    width: 0;
    height: 0;
    background-color: #505050;
    border-radius: 20px;
    border: 2px solid #303030;
    z-index: 1000;
    opacity: 0;
    overflow: hidden;
    box-shadow: 
        0 50px 100px rgba(0, 0, 0, 0.5),
        0 30px 60px rgba(0, 0, 0, 0.4),
        0 20px 40px rgba(0, 0, 0, 0.3),
        0 10px 20px rgba(0, 0, 0, 0.2),
        inset 0 1px 2px rgba(255, 255, 255, 0.1);
    will-change: transform, width, height, opacity, border-radius;
}

.modal-content {
    padding: 40px;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    color: #f0f0f0;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform, opacity;
}

.close-button {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 30px;
    height: 30px;
    background-color: #303030;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1001;
    opacity: 0;
    transform: scale(0);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 2px rgba(255, 255, 255, 0.1);
}

.close-button:hover {
    background-color: #404040;
    transform: scale(1.1);
}

.close-button:active {
    transform: scale(0.9);
}

.close-button::before, .close-button::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60%;
    height: 2px;
    background-color: #f0f0f0;
}

.close-button::before {
    transform: translate(-50%, -50%) rotate(45deg);
}

.close-button::after {
    transform: translate(-50%, -50%) rotate(-45deg);
}

.modal.active .close-button {
    opacity: 1;
    transform: scale(1);
    transition-delay: 0.6s;
}

.modal.active .modal-content {
    opacity: 1;
    transform: scale(1);
    transition-delay: 0.4s;
}

        transform: translate(-50%, -50%) scale(0.65) rotateX(16deg) rotateY(16deg);
        width: 140px;
        height: 93px;
        opacity: 0.35;
        border-radius: 7px;
    }
    70% {
        transform: translate(-50%, -50%) scale(0.6) rotateX(18deg) rotateY(18deg);
        width: 120px;
        height: 80px;
        opacity: 0.3;
        border-radius: 6px;
    }
    75% {
        transform: translate(-50%, -50%) scale(0.5) rotateX(20deg) rotateY(20deg);
        width: 100px;
        height: 67px;
        opacity: 0.25;
        border-radius: 5px;
    }
    80% {
        transform: translate(-50%, -50%) scale(0.4) rotateX(25deg) rotateY(25deg);
        width: 80px;
        height: 53px;
        opacity: 0.2;
        border-radius: 4px;
    }
    85% {
        transform: translate(-50%, -50%) scale(0.3) rotateX(30deg) rotateY(30deg);
        width: 60px;

    }
    90% {

}

/* Animation für das Öffnen anwenden */
.modal.active {
    display: block;
    animation: appleModalOpen 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* Animation für das Schließen anwenden */
.modal.closing {
    animation: appleModalClose 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* Hintergrund-Overlay */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.7);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.modal-overlay.active {
    display: block;
    opacity: 1;
    animation: overlayFadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes overlayFadeIn {
    0% {
        opacity: 0;
    }
    100% {
        opacity: 1;
    }
}

@keyframes overlayFadeOut {
    0% {
        opacity: 1;
    }
    100% {
        opacity: 0;
    }
}
        
        .close-button {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background-color: #303030;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Runder Button -->
        <div class="round-button" id="modalButton"></div>
        
        <!-- Toggle Switch -->
        <div class="toggle-container" id="toggle">
            <div class="toggle-switch"></div>
        </div>
        
        <!-- Slider -->
        <div class="slider-container">
            <input type="range" min="0" max="100" value="50" class="slider" id="slider">
        </div>
    </div>
    
    <!-- Modal Fenster -->
    <div class="modal" id="modal">
        <div class="close-button" id="closeButton"></div>
        <div class="modal-content">example text</div>
    </div>

    <script>
        // Modal Button Funktion
        const modalButton = document.getElementById('modalButton');
        const modal = document.getElementById('modal');
        const closeButton = document.getElementById('closeButton');
        
        modalButton.addEventListener('click', function() {
            modal.classList.add('active');
        });
        
        closeButton.addEventListener('click', function() {
            modal.classList.remove('active');
        });
        
        // Schließe Modal, wenn außerhalb geklickt wird
        modal.addEventListener('click', function(event) {
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        });
        
        // Toggle Switch Funktion
        const toggle = document.getElementById('toggle');
        
        toggle.addEventListener('click', function() {
            toggle.classList.toggle('active');
        });
        
        // Slider Funktion
        const slider = document.getElementById('slider');
        
        slider.addEventListener('input', function() {
            // Der Slider hat keine spezielle Funktion außer seinen Wert zu ändern
            console.log("Slider Wert:", slider.value);
        });
    </script>
</body>
</html>
